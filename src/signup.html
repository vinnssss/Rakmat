<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <title>Signup - InApp Inventory Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/images/favicon_io/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon_io/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="./assets/images/favicon_io/favicon-16x16.png">
  <link rel="manifest" href="./assets/images/favicon_io/site.webmanifest">
  <style>.no-fouc{visibility:hidden}</style>
  <script>
    document.documentElement.classList.add('no-fouc');
    setTimeout(function(){ document.documentElement.classList.remove('no-fouc'); }, 600);
  </script>
  <script type="module" src="./assets/js/main.js"></script>
</head>

<body>

<div class="container d-flex align-items-center justify-content-center min-vh-100">
  <div class="card" style="max-width:420px; width:100%;">
    <div class="card-body p-5">
      <div class="text-center mb-3">
        <a href="index.html" class="mb-4 d-inline-block">
          <img src="./assets/images/Rakmart.png" alt="" width="100">
          <span class="ms-2"><img src="./assets/images/logo.svg" alt=""></span>
        </a>
        <h1 class="card-title mb-5 h5">Buat Akun Baru</h1>
      </div>

      <div id="alertBox" class="alert d-none mb-3" role="alert"></div>

      <form id="registerForm" class="needs-validation mt-3" novalidate>

        <div class="mb-3">
          <label for="fullName" class="form-label">Nama Lengkap</label>
          <input id="fullName" type="text" class="form-control" placeholder="Contoh: Budi Santoso" required>
          <div class="invalid-feedback">Nama lengkap wajib diisi.</div>
        </div>

        <div class="mb-3">
          <label for="username" class="form-label">Username</label>
          <input id="username" type="text" class="form-control" placeholder="Contoh: budi123" required autocomplete="username">
          <div class="invalid-feedback">Username wajib diisi.</div>
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input id="password" type="password" class="form-control" placeholder="Minimal 6 karakter" required minlength="6">
          <div class="invalid-feedback">Password minimal 6 karakter.</div>
        </div>

        <div class="mb-3">
          <label for="confirmPassword" class="form-label">Konfirmasi Password</label>
          <input id="confirmPassword" type="password" class="form-control" placeholder="Ulangi password" required
            oninput="this.setCustomValidity(document.getElementById('password').value !== this.value ? 'Password tidak cocok.' : '')">
          <div class="invalid-feedback">Password tidak cocok.</div>
        </div>

        <div class="mb-3 form-check">
          <input id="terms" class="form-check-input" type="checkbox" required>
          <label class="form-check-label small" for="terms">
            Saya setuju dengan <a href="#" class="text-decoration-none">syarat dan ketentuan</a>
          </label>
          <div class="invalid-feedback">Wajib menyetujui syarat & ketentuan.</div>
        </div>

        <button class="btn btn-primary w-100" type="submit" id="submitBtn">Daftar Sekarang</button>
      </form>

      <div class="text-center mt-3 small text-muted">
        Sudah punya akun? <a href="index.html" class="link-primary">Masuk</a>
      </div>
    </div>
  </div>
</div>

<script>
  document.getElementById('registerForm').addEventListener('submit', async function (e) {
    e.preventDefault();

    const form = this;
    form.classList.add('was-validated');
    if (!form.checkValidity()) return;

    const name      = document.getElementById('fullName').value.trim();
    const username  = document.getElementById('username').value.trim();
    const password  = document.getElementById('password').value;
    const submitBtn = document.getElementById('submitBtn');

    submitBtn.disabled     = true;
    submitBtn.textContent  = 'Mendaftarkan...';

    try {
      // ✅ FIX: URL Railway yang benar (4dcd)
      const res = await fetch('https://rakmat-production.up.railway.app/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, username, password })
      });
      const result = await res.json();

      if (result.status === 'success') {
        showAlert('success', '✅ ' + result.message + ' Mengalihkan ke halaman login...');
        setTimeout(() => { window.location.href = 'index.html'; }, 1800);
      } else {
        showAlert('danger', '❌ ' + result.message);
        submitBtn.disabled    = false;
        submitBtn.textContent = 'Daftar Sekarang';
      }
    } catch (err) {
      showAlert('danger', '❌ Tidak dapat terhubung ke server. Pastikan backend sudah menyala.');
      submitBtn.disabled    = false;
      submitBtn.textContent = 'Daftar Sekarang';
    }
  });

  function showAlert(type, msg) {
    const box     = document.getElementById('alertBox');
    box.className = `alert alert-${type}`;
    box.innerHTML = msg;
    box.classList.remove('d-none');
  }
</script>

</body>
</html>
